<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            /* Blue Gradient Theme */
            background: linear-gradient(45deg, #2193b0, #6dd5ed); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .profile-img {
            width: 96px; height: 96px;
            border-radius: 50%; border: 3px solid white;
            margin-bottom: 15px; object-fit: cover;
            background-color: #ddd; 
        }
        h1 { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 5px; font-weight: 600; }
        .bio { font-size: 0.9rem; color: #333; margin-bottom: 20px; line-height: 1.4; }
        .social-icons { margin-bottom: 25px; }
        .social-icons a { font-size: 1.2rem; margin: 0 10px; color: #1a1a1a; transition: 0.3s; text-decoration: none; }
        .social-icons a:hover { color: #ffffff; }
        .links-container { display: flex; flex-direction: column; gap: 15px; }
        .link-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 16px; border-radius: 15px;
            text-decoration: none; color: #1a1a1a;
            font-weight: 600; display: flex;
            align-items: center; justify-content: center;
            position: relative; transition: all 0.3s ease;
        }
        .link-card i { position: absolute; left: 20px; font-size: 1.2rem; }
        .link-card:hover { background: rgba(255, 255, 255, 0.6); transform: translateY(-3px); }
    </style>
</head>
<body>

" alt="Profile" class="profile-img">
